<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>RLPong — Rocket League × Pong</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --blue: #3b82f6;
        --orange: #fb923c;
        --bg: #0a0e1a;
        --text: #e2e8f0;
        --dim: #94a3b8;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: radial-gradient(circle at 50% 30%, #131c36 0%, var(--bg) 70%);
        color: var(--text);
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        overflow: hidden;
      }
      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
      }
      #game {
        width: min(96vw, calc(96vh * 16 / 9));
        aspect-ratio: 16 / 9;
        border-radius: 14px;
        box-shadow:
          0 0 60px rgba(59, 130, 246, 0.25),
          0 0 120px rgba(249, 115, 22, 0.12);
        background: var(--bg);
      }
      .menu {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: rgba(6, 9, 18, 0.82);
        backdrop-filter: blur(6px);
        text-align: center;
        padding: 24px;
      }
      .title {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        font-size: clamp(40px, 9vw, 96px);
        letter-spacing: 0.08em;
        margin: 0;
        background: linear-gradient(90deg, var(--blue), var(--orange));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 40px rgba(99, 102, 241, 0.4);
      }
      .subtitle {
        font-size: 18px;
        color: var(--dim);
        margin: 0 0 8px;
        letter-spacing: 0.2em;
      }
      .label {
        font-size: 12px;
        color: var(--dim);
        letter-spacing: 0.3em;
        margin: 12px 0 0;
      }
      .controls {
        font-size: 13px;
        color: var(--dim);
        line-height: 1.9;
        margin-top: 18px;
      }
      .controls b {
        color: var(--text);
      }
      .row {
        display: flex;
        gap: 10px;
      }
      .btn {
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        letter-spacing: 0.08em;
        font-size: 16px;
        padding: 14px 28px;
        min-width: 220px;
        border: 2px solid transparent;
        border-radius: 10px;
        cursor: pointer;
        color: #06121f;
        transition:
          transform 0.12s ease,
          box-shadow 0.2s ease,
          background 0.2s ease;
      }
      .btn:hover {
        transform: translateY(-2px);
      }
      .btn:focus-visible {
        outline: 3px solid var(--text);
        outline-offset: 3px;
      }
      .btn-primary {
        background: var(--blue);
        box-shadow: 0 0 24px rgba(59, 130, 246, 0.5);
      }
      .btn-secondary {
        background: var(--orange);
        box-shadow: 0 0 24px rgba(249, 115, 22, 0.5);
      }
      .btn-ghost,
      .btn-active {
        background: transparent;
        color: var(--text);
        border-color: var(--dim);
        min-width: 90px;
        padding: 10px 16px;
        font-size: 14px;
      }
      .btn-active {
        border-color: var(--blue);
        color: var(--blue);
        box-shadow: 0 0 18px rgba(59, 130, 246, 0.4);
      }
      @media (prefers-reduced-motion: reduce) {
        .btn {
          transition: none;
        }
        .btn:hover {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
